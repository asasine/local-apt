name: Tag release

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Version number (e.g. 1.4.0)"
                required: true
                type: string

jobs:
    tag:
        name: Tag release
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: main

            - name: Install dependencies
              run: sudo apt-get update && sudo apt-get install -y devscripts dpkg-dev

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Finalize changelog
              run: |
                  dch --controlmaint --newversion "${{ inputs.version }}" ''
                  dch --controlmaint --release ''

            - name: Update Cargo.toml version
              run: |
                  sed -i "s/^version = \".*\"/version = \"${{ inputs.version }}\"/" Cargo.toml

            - name: Commit and tag
              run: |
                  git add debian/changelog Cargo.toml
                  git commit -m "Release v${{ inputs.version }}"
                  git tag "v${{ inputs.version }}"
                  git push origin main "v${{ inputs.version }}"
